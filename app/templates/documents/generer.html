{% extends "base.html" %}
{% block title %}{{ modele.nom if modele else "Document" }} - Finess-for-Laure{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/documents">Documents</a></li>
        <li class="breadcrumb-item active">{{ modele.nom if modele else "?" }}</li>
    </ol>
</nav>

<h1 class="mb-4">{{ modele.nom if modele else "Modele introuvable" }}</h1>

{% if modele %}
<div class="card">
    <div class="card-body">
        <form method="post" action="/documents/generer">
            <input type="hidden" name="modele_id" value="{{ modele.id }}">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">N FINESS ET *</label>
                    <input type="text" name="nofinesset" class="form-control" required maxlength="9">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Nom de l'ARS</label>
                    <input type="text" name="ars_nom" class="form-control" value="ARS [Region]">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Adresse de l'ARS</label>
                    <input type="text" name="ars_adresse" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Lieu</label>
                    <input type="text" name="lieu" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Nom du signataire</label>
                    <input type="text" name="signataire_nom" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Titre du signataire</label>
                    <input type="text" name="signataire_titre" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Delai (jours)</label>
                    <input type="text" name="delai_jours" class="form-control" value="30">
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-file-earmark"></i> Generer</button>
                <a href="/documents" class="btn btn-outline-secondary ms-2">Retour</a>
            </div>
        </form>
    </div>
</div>
{% endif %}
{% endblock %}
