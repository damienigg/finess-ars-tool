{% extends "base.html" %}
{% block title %}Nouveau dossier - Finess-for-Laure{% endblock %}

{% block content %}
<h1 class="mb-4">Nouveau dossier</h1>

{% if etab %}
<div class="alert alert-info">
    Création d'un dossier pour <strong>{{ etab.rs }}</strong>
    (<code>{{ etab.nofinesset }}</code>) &mdash; {{ etab.libcommune }}
</div>
{% endif %}

<div class="card">
    <div class="card-body">
        <form method="post" action="/workflow/nouveau">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">N FINESS ET *</label>
                    <input type="text" name="nofinesset" class="form-control" required maxlength="9" placeholder="123456789" value="{{ nofinesset }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Type de demande *</label>
                    <select name="type_demande" class="form-select" required>
                        {% for t in types %}
                        <option value="{{ t }}">{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date d'echeance</label>
                    <input type="date" name="date_echeance" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Objet / description</label>
                    <textarea name="objet" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Demandeur</label>
                    <input type="text" name="demandeur" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Agent instructeur</label>
                    <input type="text" name="agent_instructeur" class="form-control">
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Creer le dossier</button>
                <a href="/workflow" class="btn btn-outline-secondary ms-2">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
