<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FINESS ARS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-hospital"></i> FINESS ARS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/recherche"><i class="bi bi-search"></i> Recherche</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/qualite"><i class="bi bi-shield-check"></i> Qualite</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/workflow"><i class="bi bi-kanban"></i> Dossiers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reconciliation"><i class="bi bi-arrow-left-right"></i> Reconciliation</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cartographie"><i class="bi bi-geo-alt"></i> Carte</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/documents"><i class="bi bi-file-earmark-text"></i> Documents</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pilotage"><i class="bi bi-bar-chart-line"></i> Pilotage</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/import"><i class="bi bi-upload"></i> Import</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-4 my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-light text-muted py-3 mt-5">
        <div class="container text-center">
            <small>FINESS ARS - Outil d'assistance &mdash; Usage interne ARS</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
