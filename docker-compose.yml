services:
  app:
    build: .
    image: finess-ars:latest
    container_name: finess-ars
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/finess.db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-/data/logs/app.log}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    volumes:
      - finess_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  finess_data:
